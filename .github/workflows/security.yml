# Bundle secret scan + dependency audit + gitleaks (no live Supabase probes).
# Run RLS probes manually: npm run security:rls-probe (staging env).

name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  bundle-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build + scan dist for leaked secrets
        run: npm run scan:bundle

      - name: npm audit (high+ on production deps)
        run: npm audit --omit=dev --audit-level=high

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
