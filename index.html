<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <!-- Responsive / PWA viewport. `viewport-fit=cover` enables env(safe-area-inset-*)
         on iOS notch devices; our pwa-responsive.css picks those values up. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Color scheme hints: Chrome tab bar, Safari status bar, Android address bar. -->
    <meta name="theme-color" content="#f8fafc" />
    <meta name="color-scheme" content="light" />

    <!-- iOS web app behaviour: full-screen when launched from Home Screen. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Zitouna" />

    <!-- Social / search discovery. -->
    <meta name="description" content="Zitouna Garden — gestion des ventes, coordination et suivi des parcelles d'oliviers." />

    <!-- Icons. favicon.svg doubles as the PWA icon (declared in manifest). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#95c13d" />

    <!-- PWA manifest. -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Dashboard fonts — Inter + Inter Tight (portfolio dashboard) and
         IBM Plex Sans Arabic + Readex Pro for the bilingual auth pages.
         IBM Plex Sans Arabic renders modern, clean Arabic glyphs that
         pair well with Inter for mixed FR/AR labels. Readex Pro acts as
         a display Arabic face for the hero headline. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700;800&family=Readex+Pro:wght@500;600;700;800&display=swap" rel="stylesheet">

    <style>
      /* Light canvas everywhere — dark-green theme retired. Colour
         matches --zb-bg in src/styles/theme-light.css and the admin
         canvas background so pre-React paint never flashes. */
      html, body, #root { background: #f8fafc; min-height: 100vh; min-height: 100dvh; }
      /* Prevent the 300ms iOS tap delay + suppress tap highlight colour globally.
         Our buttons use :active / :hover / :focus for feedback. */
      html { -webkit-tap-highlight-color: transparent; }
      /* Eliminate accidental horizontal scroll caused by oversized pre-render
         content or rogue overflowing children. pwa-responsive.css locks the
         inner tree too. */
      body { overflow-x: hidden; overscroll-behavior-y: contain; }
    </style>
    <script src="/theme-init.js"></script>
    <title>Zitouna Garden</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
